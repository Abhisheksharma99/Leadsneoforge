# LeadsNeoForge Production Docker Compose
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# Prerequisites:
#   - Copy .env.example -> .env.production and fill in values
#
# Architecture:
#   Host Nginx (SSL) -> localhost:3001 -> Next.js app

services:
  app:
    build: .
    container_name: leadsneoforge-app
    env_file: .env.production
    environment:
      - NODE_ENV=production
      - PORT=3001
    ports:
      - "3001:3001"
    volumes:
      - app-data:/app/data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/auth/session"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  app-data:
