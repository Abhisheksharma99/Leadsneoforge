# Host Nginx server block for LeadsNeoForge
# Copy to: /etc/nginx/sites-available/leadsneoforge
# Enable: ln -s /etc/nginx/sites-available/leadsneoforge /etc/nginx/sites-enabled/
# Then:   sudo certbot --nginx -d leadsneoforge.neocodehub.com
#         sudo nginx -t && sudo systemctl reload nginx

server {
    server_name leadsneoforge.neocodehub.com;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # SSL will be added by Certbot:
    # sudo certbot --nginx -d leadsneoforge.neocodehub.com
    listen 80;
}
